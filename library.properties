name=planterm
version=0.1.0
author=Timo Derstappen
maintainer=Timo Derstappen <teemow@gmail.com>
sentence=CAREL pLAN terminal protocol library: act as a pGD terminal to decode, enroll, navigate and edit.
paragraph=Implements the CAREL pLAN terminal role as reverse-engineered from one uPC controller. Frame grammar, keypad encoding, poll-token matching, stream re-splitting and display-record decode. Header-only, platform-agnostic C++17: bytes in, bytes out; you supply the (9-bit capable) transport.
category=Communication
url=https://github.com/teemow/planterm
architectures=*
includes=plan_frame.h,plan_screen.h,plan_snapshot.h,hex_format.h
