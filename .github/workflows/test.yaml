name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # test_plan_cap.cpp exercises the PLANCAP Noise handshake against the
      # same noise-c the ESPHome firmware bundles, built here for the host
      # (reference backend, OS RNG). Pinned commit; noise-c barely moves.
      - name: Build noise-c for the host
        run: |
          set -e
          git clone https://github.com/esphome/noise-c /tmp/noise-c
          git -C /tmp/noise-c checkout a1e08809a1b8f65cd91765ba7d68a6d00648ad61
          mkdir /tmp/noise-obj && cd /tmp/noise-obj
          for f in /tmp/noise-c/src/protocol/*.c \
                   /tmp/noise-c/src/backend/ref/cipher-chachapoly.c \
                   /tmp/noise-c/src/backend/ref/dh-curve25519.c \
                   /tmp/noise-c/src/backend/ref/hash-sha256.c \
                   /tmp/noise-c/src/crypto/chacha/chacha.c \
                   /tmp/noise-c/src/crypto/donna/poly1305-donna.c \
                   /tmp/noise-c/src/crypto/sha2/sha256.c \
                   /tmp/noise-c/src/crypto/x25519/x25519.c; do
            cc -c -O1 -DNOISE_USE_REFERENCE_BACKEND=1 -DNOISE_USE_LIBSODIUM=0 \
               -DNOISE_USE_CUSTOM_RAND=0 -I/tmp/noise-c/include -I/tmp/noise-c/src "$f"
          done
      - name: Compile and run all host tests
        run: |
          set -e
          for t in test/test_*.cpp; do
            echo "== $t"
            if [ "$t" = "test/test_plan_cap.cpp" ]; then
              c++ -std=c++17 -Wall -Wextra -Werror -DPLAN_CAP_NOISE \
                  -I/tmp/noise-c/include "$t" /tmp/noise-obj/*.o -o /tmp/t
            else
              c++ -std=c++17 -Wall -Wextra -Werror "$t" -o /tmp/t
            fi
            /tmp/t
          done

  example-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-espressif32-6.9.0
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build BusCapture example (ESP32-C3)
        run: >
          pio ci examples/BusCapture/BusCapture.ino
          --lib .
          --board lolin_c3_mini
          --project-option "platform=espressif32@6.9.0"

  # Full firmware build of the plan_bridge component against real ESPHome +
  # esp-idf: catches include/namespace/codegen breakage without hardware. The
  # example YAML uses a local source, so the checkout under test is what
  # compiles (the component symlinks this repo in as the planterm library).
  esphome-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: ~/.platformio
          key: pio-esphome-${{ runner.os }}-2026.6.4
      - name: Install ESPHome
        run: pip install "esphome==2026.6.4"
      - name: Compile plan_bridge example
        run: esphome compile esphome/plan-bridge-example.yaml
